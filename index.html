<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#09060d">
<title>ABYSS DOMINION</title>
<link rel="stylesheet" href="./src/styles/reset.css">
<link rel="stylesheet" href="./src/styles/app.css">
</head>
<body>
<div id="app">
  <section id="home" class="screen active">
    <div class="page">
      <div class="eyebrow">ABYSS DOMINION</div>
      <h1>地下1000階の魔王</h1>
      <p class="muted">探索・戦闘・捕獲・育成・装備がつながった育成開始版。</p>

      <div class="panel hero">
        <div>
          <div id="homeArea" class="gold"></div>
          <div id="homeFloor" class="headline"></div>
          <div id="homeMoney" class="muted"></div>
        </div>
        <button id="startBtn" class="primary">探索へ</button>
      </div>

      <div class="panel">
        <div class="spread"><h2>パーティー</h2><button data-open="party">編成</button></div>
        <div id="homeParty" class="compact-list"></div>
      </div>

      <div class="home-grid">
        <button data-open="monsters">モンスター</button>
        <button data-open="equipment">装備</button>
        <button data-open="inventory">持ち物</button>
        <button data-open="souls">魔魂</button>
      </div>

      <div class="panel">
        <h2>v0.0.9 Growth Update</h2>
        <ul class="features">
          <li>敵接触でターン制戦闘</li>
          <li>撃破で経験値・魔魂・装備ドロップ</li>
          <li>捕獲結晶で敵を仲間にできる</li>
          <li>手持ち・パーティー編成</li>
          <li>武器・防具・アクセサリー装着</li>
          <li>★覚醒と同種合成＋値</li>
          <li>自由パン＋デッドゾーン追尾カメラ</li>
        </ul>
      </div>

      <button id="resetBtn" class="danger full">セーブ初期化</button>
    </div>
  </section>

  <section id="explore" class="screen">
    <div class="game-shell">
      <header class="hud">
        <div><small>階</small><b id="floorHud"></b></div>
        <div><small>G</small><b id="goldHud"></b></div>
        <div><small>魔晶石</small><b id="crystalHud"></b></div>
        <div class="party-hp">
          <small>パーティーHP</small>
          <div class="bar"><i id="partyHpFill"></i></div>
          <b id="partyHpText"></b>
        </div>
        <div class="version">v0.0.9<br><span id="fps">-- FPS</span></div>
      </header>

      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
        <canvas id="minimap"></canvas>
        <button id="minimapToggle" class="minimap-toggle" aria-label="ミニマップ表示切替">MAP ON</button>
        <div id="toast" class="toast hidden"></div>
      </div>

      <nav class="bottom-nav">
        <button data-open="party">編成</button>
        <button data-open="monsters">手持ち</button>
        <button data-open="equipment">装備</button>
        <button data-open="inventory">持ち物</button>
        <button id="returnBtn" class="danger">帰還</button>
      </nav>
    </div>
  </section>

  <section id="shop" class="screen">
    <div class="page">
      <div class="spread">
        <div><div class="eyebrow">SAFE ROOM</div><h1>セレクトショップ</h1></div>
        <button id="leaveShop">探索へ</button>
      </div>
      <div class="shop-grid">
        <button data-shop="bed"><span>🛏️</span><b>ベッド</b><small>100Gで全回復</small></button>
        <button data-shop="potion"><span>🧪</span><b>回復薬</b><small>50G</small></button>
        <button data-shop="capture"><span>💎</span><b>捕獲結晶</b><small>80G</small></button>
        <button data-shop="gear"><span>⚔️</span><b>ランダム装備</b><small>180G</small></button>
      </div>
      <div id="shopMessage" class="panel">安全地帯。ここでは敵は出現しない。</div>
    </div>
  </section>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><h2 id="modalTitle"></h2><button id="modalClose">×</button></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="battle" class="battle hidden">
    <div class="battle-top">
      <div>TURN <b id="turnNo">1</b></div>
      <button id="autoBtn">AUTO OFF</button>
      <button id="speedBtn">×1.0</button>
      <button id="escapeBtn">逃げる</button>
    </div>

    <div class="enemy-card">
      <div class="spread"><div><div id="enemyName" class="enemy-name"></div><small id="enemyStatus">正常</small></div><div id="enemyIcon" class="enemy-icon"></div></div>
      <div class="bar enemy-bar"><i id="enemyHpFill"></i></div>
      <div id="enemyHpText" class="hp-number"></div>
      <div id="battleEffect" class="battle-effect"></div>
    </div>

    <div id="battleParty" class="battle-party"></div>

    <div class="command-panel">
      <div class="spread"><h2 id="actorName"></h2><span id="battleHint" class="muted"></span></div>
      <div class="commands">
        <button data-command="attack">たたかう</button>
        <button data-command="guard">ガード</button>
        <button data-command="skill">スキル</button>
        <button data-command="item">アイテム</button>
        <button data-command="capture">捕獲</button>
      </div>
    </div>
  </div>

  <div id="loot" class="loot hidden" aria-modal="true">
    <div class="loot-card">
      <div id="lootIcon" class="loot-icon"></div>
      <div id="lootTitle" class="loot-title"></div>
      <div id="lootBody"></div>
      <button id="lootClose" class="primary full">続ける</button>
    </div>
  </div>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
